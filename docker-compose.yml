version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: exam_system_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: oems_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    networks:
      - exam_network

  web:
    build: .
    container_name: exam_system_web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - exam_network
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: rootpass123
      DB_NAME: oems_db
      DB_PORT: 3306

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: exam_system_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass123
    depends_on:
      - db
    networks:
      - exam_network

volumes:
  db_data:

networks:
  exam_network:
    driver: bridge